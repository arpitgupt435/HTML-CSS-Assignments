<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcard Learning Application</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>FlashCard Learning</h1>
        <div id="set-up">
            <select name="topic" id="topic">
                <option value="HTML">HTML</option>
                <option value="CSS">CSS</option>
                <option value="JS">JAVASCRIPT</option>
            </select>
            <label for="">Number of Question</label>
            <input type="number" name="count" id="count" min="1" max="3">
            <button id="start-btn">Start Quiz</button>
        </div>
        <div id="flashcard" class="hidden">
            <div class="card" id="card">
                <div class="front" id="question"></div>
                <div class="back" id="answer"></div>
            </div>
            <div class="buttons">
                <button id="correctbtn">Correct</button>
                <button id="wrongbtn">Wrong</button>
            </div>
        </div>
        <div id="result" class="hidden">
            <h2>Quiz Completed</h2>
            <p id="scoreText"></p>
            <button id="restart">Restart</button>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
